<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PangChu Studio — Website UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      color: #17324d;
      background:
        radial-gradient(circle at top left, rgba(137,212,255,0.42), transparent 30%),
        radial-gradient(circle at top right, rgba(164,239,214,0.32), transparent 24%),
        linear-gradient(180deg, #dff4ff, #f6fbff);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="GameSection.jsx"></script>
  <script type="text/babel" src="LinksSection.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#59b8ff",
      "accentDeep": "#3399ee",
      "mintAccent": "#8ae4c5",
      "bodyFont": "Inter",
      "heroPadding": 52,
      "showStatusBadge": true
    }/*EDITMODE-END*/;

    const App = () => {
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const [activeNav, setActiveNav] = React.useState('game');

      // Apply accent CSS vars dynamically
      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty('--primary', tweaks.accentColor);
        root.style.setProperty('--primary-deep', tweaks.accentDeep);
        root.style.setProperty('--accent', tweaks.mintAccent);
        root.style.setProperty('--font-sans', tweaks.bodyFont + ', ui-sans-serif, system-ui, sans-serif');
      }, [tweaks]);

      // Tweak panel messaging
      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const updateTweak = (key, val) => {
        const next = { ...tweaks, [key]: val };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
      };

      // Persist nav scroll position
      React.useEffect(() => {
        const saved = localStorage.getItem('pangchu-nav');
        if (saved) setActiveNav(saved);
      }, []);
      const handleNav = (section) => {
        setActiveNav(section);
        localStorage.setItem('pangchu-nav', section);
        if (section === 'top') window.scrollTo({ top: 0, behavior: 'smooth' });
        else {
          const el = document.getElementById(section);
          if (el) el.scrollIntoView({ behavior: 'smooth' });
        }
      };

      return (
        <>
          <Header active={activeNav} onNav={handleNav} />
          <main id="top">
            <Hero onNav={handleNav} heroPadding={tweaks.heroPadding} showStatus={tweaks.showStatusBadge} />
            <GameSection />
            <LinksSection />
          </main>
          <Footer />

          {/* Tweaks Panel */}
          {tweaksOpen && (
            <div style={{
              position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
              background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(18px)',
              border: '1px solid rgba(92,151,201,0.2)',
              borderRadius: 20, padding: '20px 22px', width: 280,
              boxShadow: '0 20px 60px rgba(67,133,193,0.18)',
              fontFamily: 'Inter, sans-serif',
            }}>
              <div style={{ fontWeight: 800, fontSize: 15, color: '#17324d', marginBottom: 16, letterSpacing: '-0.02em' }}>Tweaks</div>

              {[
                { key: 'accentColor', label: 'Primary color', type: 'color' },
                { key: 'accentDeep', label: 'Primary deep', type: 'color' },
                { key: 'mintAccent', label: 'Mint accent', type: 'color' },
              ].map(({ key, label, type }) => (
                <div key={key} style={{ marginBottom: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: '#587089' }}>{label}</label>
                  <input type={type} value={tweaks[key]} onChange={e => updateTweak(key, e.target.value)}
                    style={{ width: 40, height: 28, borderRadius: 8, border: '1px solid rgba(92,151,201,0.2)', cursor: 'pointer', padding: 2 }} />
                </div>
              ))}

              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 13, fontWeight: 600, color: '#587089', display: 'block', marginBottom: 6 }}>Hero top padding</label>
                <input type="range" min={24} max={100} value={tweaks.heroPadding} onChange={e => updateTweak('heroPadding', +e.target.value)}
                  style={{ width: '100%', accentColor: tweaks.accentColor }} />
                <span style={{ fontSize: 12, color: '#587089' }}>{tweaks.heroPadding}px</span>
              </div>

              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <label style={{ fontSize: 13, fontWeight: 600, color: '#587089' }}>Status badge</label>
                <input type="checkbox" checked={tweaks.showStatusBadge} onChange={e => updateTweak('showStatusBadge', e.target.checked)}
                  style={{ width: 18, height: 18, accentColor: tweaks.accentColor, cursor: 'pointer' }} />
              </div>
            </div>
          )}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
