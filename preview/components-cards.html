<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg2); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .card { background: rgba(255,255,255,0.82); border: 1px solid rgba(92,151,201,0.18); border-radius: 22px; box-shadow: 0 20px 60px rgba(67,133,193,0.14); padding: 22px; min-width: 180px; flex: 1; }
  .card h4 { margin: 0 0 8px; font-size: 17px; font-weight: 800; letter-spacing: -0.03em; color: #17324d; }
  .card p { margin: 0; font-size: 14px; color: #587089; line-height: 1.6; }
  .card-mini { background: rgba(255,255,255,0.7); border: 1px solid rgba(89,184,255,0.12); border-radius: 16px; padding: 14px; }
  .card-mini strong { display: block; font-size: 17px; font-weight: 800; margin-bottom: 4px; color: #17324d; }
  .card-mini span { font-size: 13px; color: #587089; }
  .card-hover { transition: transform 0.15s ease, border-color 0.15s ease; cursor: pointer; }
  .card-hover:hover { transform: translateY(-2px); border-color: rgba(51,153,238,0.3)!important; }
</style></head><body>
<div class="row">
  <div class="card">
    <h4>Simple controls</h4>
    <p>Easy to pick up and comfortable for casual mobile play.</p>
  </div>
  <div class="card">
    <h4>Charming style</h4>
    <p>Cloudy skies, soft colors, and a cozy cat-themed identity.</p>
  </div>
  <div class="card card-hover">
    <h4>Open Page →</h4>
    <p>Hover state: border deepens, card lifts 2px.</p>
  </div>
</div>
<div class="row" style="margin-top:12px">
  <div class="card-mini"><strong>Game</strong><span>MalrangNyang</span></div>
  <div class="card-mini"><strong>Genre</strong><span>Cute casual mobile</span></div>
  <div class="card-mini"><strong>Studio</strong><span>PangChu Studio</span></div>
  <div class="card-mini"><strong>Platform</strong><span>iOS & Android</span></div>
</div>
</body></html>
