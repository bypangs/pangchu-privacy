<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg2); font-family: var(--font-sans); padding: 24px 20px; }
  .row { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-end; }
  .sbox { background: white; border: 1px solid rgba(92,151,201,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .slabel { font-size: 11px; font-weight: 700; color: #587089; padding: 8px 10px; text-align: center; line-height: 1.4; font-family: monospace; }
</style></head><body>
<div class="row">
  <div><div class="sbox" style="width:100px;height:64px;border-radius:16px;box-shadow:0 20px 60px rgba(67,133,193,0.14)"></div><div class="slabel">Card<br>0 20px 60px</div></div>
  <div><div class="sbox" style="width:80px;height:50px;border-radius:14px;box-shadow:0 12px 30px rgba(64,145,210,0.24)"></div><div class="slabel">Badge<br>0 12px 30px</div></div>
  <div><div class="sbox" style="width:80px;height:40px;border-radius:999px;box-shadow:0 14px 28px rgba(51,153,238,0.24);background:linear-gradient(135deg,#59b8ff,#3399ee)"></div><div class="slabel">Button<br>0 14px 28px</div></div>
  <div><div class="sbox" style="width:90px;height:54px;border-radius:16px;box-shadow:0 16px 34px rgba(82,149,201,0.16)"></div><div class="slabel">Banner<br>0 16px 34px</div></div>
</div>
</body></html>
