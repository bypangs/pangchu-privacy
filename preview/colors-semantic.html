<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg2); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
  .chip { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 999px; font-size: 13px; font-weight: 700; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
</style></head><body>
<div class="row">
  <div class="chip" style="background:rgba(22,196,127,0.1); color:#14a56b">
    <div class="dot" style="background:#16c47f; box-shadow:0 0 0 6px rgba(22,196,127,0.12)"></div>
    Live · Active
  </div>
  <div class="chip" style="background:rgba(89,184,255,0.12); color:#3399ee">
    <div class="dot" style="background:#59b8ff"></div>
    Info · Link
  </div>
  <div class="chip" style="background:rgba(138,228,197,0.18); color:#19936d">
    <div class="dot" style="background:#8ae4c5"></div>
    Mint · Casual
  </div>
  <div class="chip" style="background:rgba(255,200,120,0.18); color:#b07020">
    <div class="dot" style="background:#ffbb55"></div>
    Warm · Notice
  </div>
  <div class="chip" style="background:rgba(92,151,201,0.1); color:#587089">
    <div class="dot" style="background:#587089"></div>
    Muted · Disabled
  </div>
</div>
</body></html>
