<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg2); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 120px; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 14px rgba(67,133,193,0.12); }
  .swatch-color { height: 80px; }
  .swatch-info { background: white; padding: 10px 12px; }
  .swatch-name { font-size: 12px; font-weight: 700; color: #17324d; }
  .swatch-desc { font-size: 11px; color: #587089; margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background: radial-gradient(circle at top left, rgba(137,212,255,0.42), transparent 60%), radial-gradient(circle at top right, rgba(164,239,214,0.32), transparent 50%), linear-gradient(180deg,#dff4ff,#f6fbff)"></div><div class="swatch-info"><div class="swatch-name">Page Background</div><div class="swatch-desc">Radial clouds + sky-to-white</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background: linear-gradient(180deg, #8fd8ff 0%, #bdeaff 52%, #e6fff4 100%)"></div><div class="swatch-info"><div class="swatch-name">Sky (Game Visual)</div><div class="swatch-desc">Blue → mint sky panel</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background: linear-gradient(135deg, #7fd0ff, #8be7c7)"></div><div class="swatch-info"><div class="swatch-name">Brand Badge</div><div class="swatch-desc">Blue → mint 135°</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background: linear-gradient(135deg, #59b8ff, #3399ee)"></div><div class="swatch-info"><div class="swatch-name">Primary Button</div><div class="swatch-desc">Sky blue 135°</div></div></div>
</div>
</body></html>
