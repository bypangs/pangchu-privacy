<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg2); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 4px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { background: linear-gradient(180deg, #59b8ff, #8ae4c5); border-radius: 4px 4px 0 0; width: 28px; }
  .lbl { font-size: 10px; font-weight: 700; color: #587089; font-family: monospace; text-align: center; }
</style></head><body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px"></div><div class="lbl">4</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="lbl">8</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="lbl">12</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="lbl">16</div></div>
  <div class="item"><div class="bar" style="height:20px"></div><div class="lbl">20</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="lbl">24</div></div>
  <div class="item"><div class="bar" style="height:28px"></div><div class="lbl">28</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="lbl">32</div></div>
  <div class="item"><div class="bar" style="height:36px"></div><div class="lbl">36</div></div>
  <div class="item"><div class="bar" style="height:40px"></div><div class="lbl">40</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="lbl">48</div></div>
  <div class="item"><div class="bar" style="height:56px"></div><div class="lbl">56</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="lbl">64</div></div>
</div>
</body></html>
