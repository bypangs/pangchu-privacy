<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg2); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .box { background: linear-gradient(135deg, #7fd0ff, #8be7c7); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .label { font-size: 11px; font-weight: 700; color: white; }
  .sublabel { font-size: 10px; color: rgba(255,255,255,0.8); font-family: monospace; }
</style></head><body>
<div class="row">
  <div class="box" style="width:90px;height:90px;border-radius:28px"><span class="label">XL</span><span class="sublabel">28px</span></div>
  <div class="box" style="width:80px;height:80px;border-radius:22px"><span class="label">LG</span><span class="sublabel">22px</span></div>
  <div class="box" style="width:70px;height:70px;border-radius:16px"><span class="label">MD</span><span class="sublabel">16px</span></div>
  <div class="box" style="width:60px;height:60px;border-radius:10px"><span class="label">SM</span><span class="sublabel">10px</span></div>
  <div class="box" style="width:50px;height:50px;border-radius:999px"><span class="label">Pill</span><span class="sublabel">999px</span></div>
  <div class="box" style="width:42px;height:42px;border-radius:14px"><span class="label">Badge</span><span class="sublabel">14px</span></div>
</div>
</body></html>
