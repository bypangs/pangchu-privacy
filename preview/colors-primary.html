<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg2); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 80px; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 14px rgba(67,133,193,0.12); }
  .swatch-color { height: 70px; }
  .swatch-info { background: white; padding: 10px 12px; }
  .swatch-name { font-size: 12px; font-weight: 700; color: #17324d; }
  .swatch-val { font-size: 11px; color: #587089; margin-top: 2px; font-family: monospace; }
</style></head><body>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#59b8ff"></div><div class="swatch-info"><div class="swatch-name">Primary</div><div class="swatch-val">#59b8ff</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#3399ee"></div><div class="swatch-info"><div class="swatch-name">Primary Deep</div><div class="swatch-val">#3399ee</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:rgba(89,184,255,0.18)"></div><div class="swatch-info"><div class="swatch-name">Primary Tint</div><div class="swatch-val">rgba(89,184,255,.18)</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#8ae4c5"></div><div class="swatch-info"><div class="swatch-name">Accent</div><div class="swatch-val">#8ae4c5</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#19936d"></div><div class="swatch-info"><div class="swatch-name">Accent Deep</div><div class="swatch-val">#19936d</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:rgba(138,228,197,0.18)"></div><div class="swatch-info"><div class="swatch-name">Accent Tint</div><div class="swatch-val">rgba(138,228,197,.18)</div></div></div>
</div>
</body></html>
